server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml;
    gzip_min_length 1024;
    gzip_vary       on;

    # ── Security headers ──────────────────────────────────────────────────────
    # NOTE: add_header must NOT appear in any child location block, otherwise
    # nginx drops all headers defined here. Cache control uses 'expires'
    # instead, which doesn't trigger that inheritance rule.
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'none'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self'; connect-src 'none'; img-src 'self' data:; font-src 'none'; form-action 'self'; frame-ancestors 'none'; base-uri 'self';" always;

    # ── Static files ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache JS/CSS for 1 day; HTML stays uncached so updates are instant
    location ~* \.(js|css)$ {
        expires 1d;
    }

    # ── Healthcheck endpoint (used by k8s liveness probe) ─────────────────────
    location = /healthz {
        access_log  off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
