apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cal-t
  namespace: argocd
  # Finalizer ensures ArgoCD deletes the k8s resources when this app is removed
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Spooky-Firefox/cal-t.git
    targetRevision: HEAD
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: cal-t

  syncPolicy:
    automated:
      prune: true       # remove k8s objects deleted from git
      selfHeal: true    # revert manual kubectl changes
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
